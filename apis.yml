aid: aurora-innovation
name: Aurora Innovation
description: >-
  Aurora Innovation is a Pittsburgh-headquartered autonomous-vehicle company
  publicly traded on NASDAQ as AUR. Its core product is the Aurora Driver, a
  self-driving system designed as a single platform deployable across vehicle
  classes - first commercialized in long-haul Class 8 trucking through Aurora
  Horizon, with Aurora Connect intended for ride-hailing applications. The
  Aurora Driver is integrated into the Volvo VNL Autonomous and PACCAR
  Peterbilt 579/Kenworth T680 trucks, uses Aurora's proprietary FirstLight FMCW
  lidar with 450+ metre range, and benefits from a NVIDIA-powered compute
  platform and Continental hardware partnership. Aurora launched commercial
  driverless freight operations in Texas in 2025 between Fort Worth, El Paso,
  Dallas, and Houston, with freight customers including Werner, Hirschbach,
  Uber Freight, FedEx, Schneider, Ryder, and Toyota Motor North America. Aurora
  does not publish a public developer API; the public surface is product,
  safety, and investor material.
